services:
  backend:
    build: ./backend
    container_name: sms_spam_backend
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=SMS Spam Detection API
      - APP_VERSION=1.0.0
      - DATA_PATH=data/spam.csv
      - ARTIFACT_DIR=artifacts
      - CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend/data:/app/data
      - ./backend/artifacts:/app/artifacts

  frontend:
    build: ./frontend
    container_name: sms_spam_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
